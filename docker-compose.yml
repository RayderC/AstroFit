services:
  comicorbit:
    image: rayderc/comicorbit:latest
    container_name: comicorbit
    restart: always
    ports:
      # host:container
      - 7080:7080
    volumes:
      # Persistent config, SQLite DB, session secret
      - ./config:/config
      # Library: downloaded CBZ files
      - ./Manga:/Manga
      - ./Comics:/Comics
    env_file:
      # Copy .env.example to .env and fill in SESSION_SECRET before starting.
      - .env
