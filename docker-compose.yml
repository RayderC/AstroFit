services:
  astrofit:
    image: rayderc/astrofit:latest
    container_name: astrofit
    restart: always
    ports:
      # host:container
      - 7090:7090
    environment:
      - SESSION_COOKIE_SECURE=false
      # Generate a strong secret: openssl rand -hex 32
      - SESSION_SECRET=${SESSION_SECRET:-change_me_to_a_random_64_char_string}
      - DATABASE_PATH=/config/astrofit.db
      - CONFIG_DIRECTORY=/config
    volumes:
      # Persistent config, SQLite DB, session secret
      - ./config:/config
      # Uploaded files (progress photos, GPX files)
      - ./uploads:/uploads
